[project]
name = "occam-gitignore-mcp"
version = "0.0.1"
description = "Model Context Protocol server for occam-gitignore."
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
  "occam-gitignore-core",
  "mcp>=1.0",
]

[project.scripts]
occam-gitignore-mcp = "occam_gitignore_mcp.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/occam_gitignore_mcp"]
