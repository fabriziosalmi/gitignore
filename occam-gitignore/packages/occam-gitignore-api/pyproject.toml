[project]
name = "occam-gitignore-api"
version = "0.0.1"
description = "HTTP API adapter for occam-gitignore."
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
  "occam-gitignore-core",
  "fastapi>=0.110",
  "uvicorn>=0.27",
  "pydantic>=2",
]

[project.scripts]
occam-gitignore-api = "occam_gitignore_api.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/occam_gitignore_api"]
