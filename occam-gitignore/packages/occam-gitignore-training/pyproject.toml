[project]
name = "occam-gitignore-training"
version = "0.0.1"
description = "Offline training pipelines for occam-gitignore (raw logs -> rules table)."
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
  "occam-gitignore-core",
]

[project.scripts]
occam-gitignore-train = "occam_gitignore_training.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/occam_gitignore_training"]
