[project]
name = "occam-gitignore-cli"
version = "0.0.1"
description = "CLI for occam-gitignore."
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
  "occam-gitignore-core",
  "typer>=0.12",
]

[project.scripts]
occam-gitignore = "occam_gitignore_cli.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/occam_gitignore_cli"]
