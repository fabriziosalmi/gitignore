target-version = "py311"
line-length = 100
src = ["packages/*/src"]

[lint]
select = ["ALL"]
ignore = [
  "D",       # docstrings: pragmatic, not a hard requirement
  "COM812", "ISC001",  # formatter conflicts
  "FBT001", "FBT002", "FBT003",  # boolean traps: pragmatic
  "TD", "FIX",         # todos
  "PLR0913",           # too many args (DI ports)
  "EM101", "EM102", "TRY003",  # exception messages
  "ERA001",            # commented-out code (false positives on regex docs)
]

[lint.per-file-ignores]
"**/tests/**" = ["S101", "S311", "PLR2004", "ANN", "INP001", "D"]
"**/__main__.py" = ["T201"]
# Typer requires call-in-default sentinels.
"**/occam_gitignore_cli/app.py" = ["B008"]

[lint.pydocstyle]
convention = "google"

[lint.isort]
known-first-party = [
  "occam_gitignore_core",
  "occam_gitignore_cli",
  "occam_gitignore_training",
  "occam_gitignore_bench",
  "occam_gitignore_api",
  "occam_gitignore_mcp",
]
