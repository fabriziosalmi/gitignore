[mypy]
python_version = 3.11
strict = True
warn_unreachable = True
disallow_any_explicit = True
disallow_any_generics = True
no_implicit_reexport = True
show_error_codes = True
show_column_numbers = True
pretty = True
mypy_path = packages/occam-gitignore-core/src:packages/occam-gitignore-cli/src:packages/occam-gitignore-training/src:packages/occam-gitignore-bench/src:packages/occam-gitignore-api/src:packages/occam-gitignore-mcp/src
namespace_packages = True
explicit_package_bases = True

[mypy-typer.*]
ignore_missing_imports = True

[mypy-occam_gitignore_api.app]
disallow_any_explicit = False

[mypy-mcp.*]
ignore_missing_imports = True

[mypy-occam_gitignore_mcp.server]
disallow_any_explicit = False

[mypy-tests.*]
disallow_any_explicit = False

[mypy-test_mcp]
disallow_any_explicit = False
